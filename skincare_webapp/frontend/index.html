<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      /* Soft Pink/Blue Pastel Theme */
      --bg-color: #FFF0F5;
      /* LavenderBlush */
      --theme-color: #FC2779;
      /* Vibrant Pink */
      --theme-color-hover: #E01E68;
      --theme-light: #FFEBF1;

      --text-main: #333333;
      --text-muted: #666666;

      --female-color: #FC2779;
      /* Pink */
      --male-color: #4A90E2;
      /* Blue */

      --card-bg: #FFFFFF;
      --card-border: #F0F0F0;

      --blob-1: rgba(252, 39, 121, 0.4);
      --blob-2: rgba(74, 144, 226, 0.4);

      --success: #10B981;
      --danger: #EF4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text-main);
      background-color: var(--bg-color);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    h1,
    h2,
    h3,
    .serif {
      font-family: 'Playfair Display', serif;
    }

    .blob {
      position: absolute;
      filter: blur(60px);
      z-index: -1;
      border-radius: 50%;
    }

    .blob-top {
      width: 50vw;
      height: 50vw;
      background: var(--blob-1);
      top: -10vw;
      left: -10vw;
    }

    .blob-bottom {
      width: 60vw;
      height: 60vw;
      background: var(--blob-2);
      bottom: -20vw;
      right: -10vw;
    }

    #root {
      max-width: 600px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.02);
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2.5rem 2rem;
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    button {
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: 30px;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(252, 39, 121, 0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--theme-color);
      color: white;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2), 0 2px 4px -1px rgba(37, 99, 235, 0.1);
    }

    .btn-primary:hover {
      background-color: var(--theme-color-hover);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3), 0 4px 6px -2px rgba(37, 99, 235, 0.15);
      transform: translateY(-1px);
    }

    .btn-outline {
      background-color: transparent;
      color: var(--theme-color);
      border: 1px solid var(--theme-color);
      width: 100%;
    }

    .btn-outline:hover {
      background-color: var(--theme-light);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card-bg);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      margin: 4px;
    }

    input,
    select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      font-family: inherit;
      font-size: 1rem;
      color: var(--text-main);
      margin-bottom: 1.5rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--theme-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .gender-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .gender-card h3 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .gender-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .gender-card:hover {
      border-color: var(--theme-color);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      transform: translateY(-2px);
    }

    .chip {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      background: #F1F5F9;
      color: var(--text-muted);
      margin: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .chip.selected {
      background: var(--theme-light);
      color: var(--theme-color);
      border-color: rgba(37, 99, 235, 0.3);
    }

    /* Product Cards - Clinical Look */
    .product-card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--card-border);
      overflow: hidden;
      margin-bottom: 1.5rem;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      border-color: #CBD5E1;
    }

    .product-image-zone {
      height: 180px;
      background: #FFFFFF;
      border-bottom: 1px solid var(--card-border);
      position: relative;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image-zone img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .product-card:hover .product-image-zone img {
      transform: scale(1.05);
    }

    .discount-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--text-main);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .product-info {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .brand-name {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
      color: var(--text-main);
    }

    .product-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      flex: 1;
      line-height: 1.5;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
    }

    .price-current {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    .price-mrp {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .rating {
      color: var(--text-main);
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
    }

    .rating-star {
      color: #F59E0B;
    }

    .buy-buttons {
      display: flex;
      gap: 12px;
    }

    .buy-btn {
      flex: 1;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid var(--card-border);
      transition: all 0.2s;
    }

    .btn-amazon {
      color: var(--text-main);
      background-color: white;
    }

    .btn-amazon:hover {
      border-color: #000;
      background-color: #F8FAFC;
    }

    .btn-nykaa {
      color: #E11D48;
      background-color: #FFF1F2;
      border-color: #FECDD3;
    }

    .btn-nykaa:hover {
      background-color: #FFE4E6;
    }

    .where-to-buy {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
    }

    /* Modern Tabs */
    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 4px;
      margin-bottom: 24px;
      scrollbar-width: none;
      border-bottom: 1px solid var(--card-border);
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 10px 16px;
      font-weight: 500;
      white-space: nowrap;
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .tab:hover {
      color: var(--text-main);
    }

    .tab.active {
      color: var(--theme-color);
      border-bottom-color: var(--theme-color);
    }

    /* Sub-tabs for filtering */
    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab.active {
      background: var(--text-main);
      color: white;
      border-color: var(--text-main);
    }

    /* Loader */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--theme-light);
      border-top: 4px solid var(--theme-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loader-step {
      font-size: 1.1rem;
      color: var(--text-muted);
      animation: fadeInOut 2s infinite;
    }

    @keyframes fadeInOut {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    /* Camera UI */
    .camera-container {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .camera-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .face-oval {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 70%;
      border: 3px dashed rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

      const videoRef = React.useRef(null);
      const [currentStep, setCurrentStep] = React.useState(0);
      const steps = ['Front Face', 'Left Aspect', 'Right Aspect'];
      const [photos, setPhotos] = React.useState([]);

      React.useEffect(() => {
        const startVideo = async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            if (videoRef.current) videoRef.current.srcObject = stream;
          } catch (err) {
            alert("Camera access was denied or not available. Reverting to upload format is recommended.");
          }
        };
        startVideo();
        return () => {
          if (videoRef.current && videoRef.current.srcObject) {
            videoRef.current.srcObject.getTracks().forEach(t => t.stop());
          }
        }
      }, []);

      const capture = () => {
        const video = videoRef.current;
        const cvs = document.createElement('canvas');
        cvs.width = video.videoWidth; cvs.height = video.videoHeight;
        cvs.getContext('2d').drawImage(video, 0, 0);
        const imgData = cvs.toDataURL('image/jpeg', 0.8);

        const newArr = [...photos, imgData];
        setPhotos(newArr);

        if (newArr.length < 3) {
          setCurrentStep(currentStep + 1);
        } else {
          if (videoRef.current && videoRef.current.srcObject) {
            videoRef.current.srcObject.getTracks().forEach(t => t.stop());
          }
          onAnalyze(newArr);
        }
      };

      return (

      React.useEffect(() => {

            setAnalysis(data.analysis);
            document.documentElement.style.setProperty('--theme-color', data.profile.gender === 'female' ? 'var(--female-color)' : 'var(--male-color)');

        document.documentElement.style.setProperty('--bg-color', '#FFFFFF');
        setScreen('profile');
      };

      const handleAnalyzeImages = async (imagesData) => {
        setScreen('loading');
        await wait(3000);

        let totalLum = 0;
        let validPixels = 0;

        const img = new Image();
        img.src = imagesData[0];
        await new Promise((resolve) => {
          img.onload = resolve;
          img.onerror = resolve; // fallback if invalid
        });

        try {
          const cvs = document.createElement('canvas');
          cvs.width = img.width || 100; cvs.height = img.height || 100;
          const ctx = cvs.getContext('2d');
          if (img.width > 0) ctx.drawImage(img, 0, 0);

          const imgData = ctx.getImageData(0, 0, cvs.width, cvs.height).data;

          for (let i = 0; i < imgData.length; i += 40) {
            const r = imgData[i], g = imgData[i + 1], b = imgData[i + 2], a = imgData[i + 3];
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            const s = max === 0 ? 0 : (max - min) / max;

            if (s < 0.65 && r >= 60 && r <= 245 && g > 40 && b > 20 && a > 128) {
              const l = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
              totalLum += l;
              validPixels++;
            }
          }
        } catch (e) {
          console.warn("Canvas Tainted - Fallback Algorithm");
          totalLum = 0.5; validPixels = 1;
        }

        const avgLum = validPixels > 0 ? (totalLum / validPixels) : 0.45;

        let currentTone = 'Medium';
        if (avgLum > 0.72) currentTone = 'Fair';
        else if (avgLum > 0.58) currentTone = 'Wheatish';
        else if (avgLum > 0.38) currentTone = 'Medium';
        else currentTone = 'Deep Brown';

        let currentType = 'Normal';
        const c = profile.concerns;
        if (c.includes('Oiliness') && c.includes('Dryness')) currentType = 'Combination';
        else if (c.includes('Oiliness') || c.includes('Acne')) currentType = 'Oily';
        else if (c.includes('Dryness')) currentType = 'Dry';
        else if (c.includes('Sensitivity')) currentType = 'Sensitive';

        const conf = Math.floor(82 + Math.random() * 13);

        // Recommendation Engine
        const recommendations = PRODUCT_DATABASE.filter(p => {
          const genderMatch = p.gender === 'both' || p.gender === profile.gender;
          const typeMatch = p.skinTypes.includes(currentType) || p.skinTypes.includes('Normal');
          const concernMatch = profile.concerns.length === 0 || p.concerns.some(con => profile.concerns.includes(con));
          return genderMatch && typeMatch && concernMatch;
        }).sort((a, b) => b.rating - a.rating);

        const topRecs = [];
        const cats = ['cleanser', 'moisturizer', 'serum', 'sunscreen', 'toner', 'mask'];
        cats.forEach(cat => {
          const catProds = recommendations.filter(p => p.category === cat);
          topRecs.push(...catProds.slice(0, 3));
        });

        const resultObj = {
          skinTone: currentTone,
          skinType: currentType,
          confidence: conf,
          recommendedProducts: topRecs.length > 0 ? topRecs : PRODUCT_DATABASE.slice(0, 5)
        };

        setAnalysis(resultObj);
        localStorage.setItem('glowai_profile', JSON.stringify({ profile, analysis: resultObj }));
        setScreen('dashboard');
      };

      return (
        <React.Fragment>
          {screen === 'splash' && <Splash onNext={() => setScreen('gender')} />}
          {screen === 'gender' && <GenderSelect onSelect={handleGender} />}
          {screen === 'profile' && <ProfileForm profile={profile} setProfile={setProfile} onNext={() => setScreen('capture-select')} />}
          {screen === 'capture-select' && <CaptureModeSelect onCamera={() => setScreen('camera')} onUpload={() => setScreen('upload')} />}
          {screen === 'camera' && <CameraCapture onAnalyze={handleAnalyzeImages} />}
          {screen === 'upload' && <UploadCapture onAnalyze={handleAnalyzeImages} />}
          {screen === 'loading' && <LoadingScreen />}
          {screen === 'dashboard' && <Dashboard profile={profile} analysis={analysis} onReAnalyze={() => setScreen('capture-select')} />}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
