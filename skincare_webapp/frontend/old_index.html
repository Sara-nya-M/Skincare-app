<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Personalized Skincare</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Decor -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <nav class="navbar">
        <div class="brand">A U R A</div>
    </nav>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1 class="hero-title">Discover Your <i>Signature</i> Glow.</h1>
            <p class="hero-subtitle">Our intelligent algorithm curates the perfect skincare routine tailored precisely to your unique biology and concerns.</p>
        </section>

        <!-- Assessment Form -->
        <section class="assessment">
            <div class="glass-panel form-container">
                <h2>Tailor Your Routine</h2>
                <form id="recommendation-form">
                    <div class="form-group">
                        <label for="skin-type">What is your primary skin type?</label>
                        <div class="select-wrapper">
                            <select id="skin-type" name="skin_type" required>
                                <option value="" disabled selected>Loading options...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="skin-concern">What is your main skin concern?</label>
                        <div class="select-wrapper">
                            <select id="skin-concern" name="skin_concern" required>
                                <option value="" disabled selected>Loading options...</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="cta-button" id="submit-btn">
                        <span>Reveal My Regimen</span>
                        <div class="spinner hidden" id="btn-spinner"></div>
                    </button>
                </form>
            </div>
        </section>

        <!-- Results Section -->
        <section class="results hidden" id="results-section">
            <div class="results-header">
                <h2>Your Curated Regimen</h2>
                <p>Designed scientifically for your skin profile.</p>
            </div>
            
            <div class="grid" id="product-grid">
                <!-- Products will be injected here via JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
